// ══════════════════ FIREBASE SYNC ══════════════════
// ══ SPLIT FIRESTORE STRUCTURE ══
// restaurant/main  → categories, tasks, managers, leaves, locations (no employees)
// restaurant/emps  → {empId: empData} (employees with photos)

async function syncToFirebase(){
  if(!S.data) return;
  try{
    // Strip photos from main doc to avoid 1MB limit
    // Photos saved separately per employee
    const dataToSave = {
      ...S.data,
      locations: S.data.locations.map(l=>({
        ...l,
        employees: l.employees.map(e=>({...e, photo:''}))
      })),
      updatedAt: new Date().toISOString()
    };
    await db.collection('restaurant').doc('main').set(dataToSave);
    // Save photos separately — one by one to avoid batch limits
    const photoSavePromises = [];
    S.data.locations.forEach(l=>l.employees.forEach(e=>{
      if(e.photo){
        photoSavePromises.push(
          db.collection('restaurant').doc('photos').collection('emps').doc(e.id)
            .set({photo: e.photo, updatedAt: new Date().toISOString()})
            .catch(err=>console.warn('photo save err for',e.id,err))
        );
      }
    }));
    if(photoSavePromises.length) await Promise.allSettled(photoSavePromises);
  }catch(err){
    console.warn('sync err',err);
    toast$('خطأ في الحفظ: '+err.message,'error');
  }
}

async function loadPhotos(){
  try{
    const snap = await db.collection('restaurant').doc('photos').collection('emps').get();

    snap.forEach(doc=>{ photos[doc.id] = doc.data().photo||''; });
    console.log(`📷 Loaded ${Object.keys(photos).length} photos`);
    return photos;
  }catch(e){
    console.warn('loadPhotos err',e);
    return {};
  }
}

function listenFirebase(){
  db.collection('restaurant').doc('main').onSnapshot(async snap=>{
    if(!snap.exists) return;
    const d = snap.data();
    const photos = await loadPhotos();
    S.data = {
      categories: d.categories||[],
      tasks:      d.tasks||[],
      managers:   d.managers||[],
      leaves:     d.leaves||[],
      locations: (d.locations||[]).map(l=>({
        ...l,
        employees: (l.employees||[]).map(e=>({...e, photo: photos[e.id]||e.photo||''}))
      }))
    };
    if(S.authUser){
      const mgr=(S.data.managers||[]).find(m=>m.email===S.authUser.email);
      S.canSeeSalary=S.isSuperAdmin||(mgr?.salaryAccess===true);
    }
    if(S.authStep==='app') render();
  }, e=>console.warn('snapshot err',e));
}

async function loadOrInit(){
  try{
    const mainSnap = await db.collection('restaurant').doc('main').get();

      const d = mainSnap.data();
      const photos = await loadPhotos();
      S.data = {
        categories: d.categories||[],
        tasks:      d.tasks||[],
        managers:   d.managers||[],
        leaves:     d.leaves||[],
        locations: (d.locations||[]).map(l=>({
          ...l,
          employees: (l.employees||[]).map(e=>({...e, photo: photos[e.id]||e.photo||''}))
        }))
      };
      if(S.authUser){
        const mgr=(S.data.managers||[]).find(m=>m.email===S.authUser.email);
        S.canSeeSalary=S.isSuperAdmin||(mgr?.salaryAccess===true);
      }
      // If old sub-collection format, migrate back
      if(d.locationsLight && !d.locations){
        toast$('جاري استعادة البيانات...','info');
        // Load employees from sub-collection
        try{
          const empsSnap = await db.collection('restaurant').doc('main').collection('emps').get();
          const empsMap = {};
          empsSnap.forEach(doc=>{ empsMap[doc.id]=doc.data(); });
          S.data.locations = (d.locationsLight||[]).map(ll=>({
            id:ll.id, name:ll.name, icon:ll.icon, color:ll.color,
            employees: (ll.empIds||[]).map(eid=>empsMap[eid]||null).filter(Boolean)
          }));
          await syncToFirebase();
          toast$('تم استعادة البيانات ✅');
        }catch(e){ console.warn('migration err',e); }
      }
    } else {
      S.data = {...DEFAULT_DATA};
      await syncToFirebase();
    }
  }catch(e){ console.warn('load err',e); S.data={...DEFAULT_DATA}; }
  listenFirebase();
}

// Manager management (Super Admin only)
async function doAddManager(){
  const email=S.newMgrEmail.trim(), name=S.newMgrName.trim(), pass=S.newMgrPass.trim();
  if(!email||!name||!pass){toast$('أدخل الإيميل والاسم وكلمة المرور','error');return;}
  if(pass.length<6){toast$('كلمة المرور 6 أحرف على الأقل','error');return;}
  if((S.data.managers||[]).find(m=>m.email===email)){toast$('هذا الإيميل مسجل مسبقاً','error');return;}

  // Save super admin credentials before creating new account
  const adminEmail = S.authUser.email;
  const adminPass  = S.savedAdminPass || '';
  if(!adminPass){
    toast$('أدخل كلمة مرورك أنت في حقل "كلمة مرورك للتأكيد"','error');
    S.authStep='app'; render(); return;
  }

  S.authStep='loading'; render();
  try{
    // Create new manager account in Firebase Auth
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({displayName: name});

    // Re-login as super admin
    await auth.signInWithEmailAndPassword(adminEmail, adminPass);

    // Save to Firestore
    if(!S.data.managers) S.data.managers=[];
    S.data.managers.push({email, name, uid:cred.user.uid, createdAt:new Date().toISOString(), salaryAccess:false});
    S.newMgrEmail=''; S.newMgrName=''; S.newMgrPass='';
    S.showAdminPassPrompt=false;
    await saveData();
    toast$('تمت إضافة المدير ✅');
  }catch(e){
    const msgs={
      'auth/email-already-in-use':'الإيميل مستخدم مسبقاً في Firebase',
      'auth/weak-password':'كلمة المرور ضعيفة جداً',
      'auth/wrong-password':'كلمة مرور المدير الرئيسي غير صحيحة',
      'auth/invalid-credential':'كلمة مرور المدير الرئيسي غير صحيحة',
    };
    toast$(msgs[e.code]||'خطأ: '+e.message,'error');
    // Try re-login as admin if we got signed out
    try{ await auth.signInWithEmailAndPassword(adminEmail, adminPass); }catch(_){}
  }
  S.authStep='app'; render();
}

  if(email===SUPER_ADMIN_EMAIL){toast$('لا يمكن حذف المدير الرئيسي','error');return;}

}

// Fix duplicate/conflicting IDs in existing data
async function fixAllIds(){
  if(!confirm('سيتم إصلاح جميع الـ IDs في البيانات. هل تريد المتابعة؟')) return;
  // Reassign unique IDs to all locations and employees
  S.data.locations = S.data.locations.map(loc => ({
    ...loc,
    id: uid(),
    employees: loc.employees.map(emp => ({
      ...emp,
      id: uid(),
      ratings: (emp.ratings||[]).map(r => ({...r, id: r.id||uid()}))
    }))
  }));
  // Fix leaves references - clear them since emp IDs changed

function handlePhotoUpload(input){
  const file=input.files[0]; if(!file)return;
  if(file.size>10*1024*1024){toast$('حجم الصورة يجب أن يكون أقل من 10MB','error');return;}
  toast$('جاري ضغط الصورة...','info');
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      // Compress to max 150x150 at quality 0.5 to stay well under Firestore limits
      const MAX=150;
      let w=img.width, h=img.height;
      if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
      else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      // Try quality 0.5 first, then lower if still too big
      let compressed=canvas.toDataURL('image/jpeg',0.5);
      let kb=Math.round(compressed.length*0.75/1024);
      // If over 80KB, lower quality further
      if(kb>80){
        compressed=canvas.toDataURL('image/jpeg',0.3);
        kb=Math.round(compressed.length*0.75/1024);
      }
      toast$(`تم ضغط الصورة: ${kb}KB ✅`);
      S.empPhoto=compressed;
      rePhotoPreview();
    };
    img.onerror=()=>toast$('خطأ في قراءة الصورة','error');
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function doBackup(){
  if(!S.data) return toast$('لا توجد بيانات للنسخ الاحتياطي','error');
  try{
    // Include photos in backup
    const photos = await loadPhotos();
    const backupData = {
      version: 2,
      backupDate: new Date().toISOString(),
      restaurantName: '99 Grill NJF',
      data: {
        ...S.data,
        locations: S.data.locations.map(l=>({
          ...l,
          employees: l.employees.map(e=>({
            ...e,
            photo: photos[e.id] || e.photo || ''
          }))
        }))
      }
    };
    const json = JSON.stringify(backupData, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const dateStr = new Date().toISOString().split('T')[0];
    a.href     = url;
    a.download = `99grill-backup-${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast$('✅ تم تنزيل النسخة الاحتياطية');
  }catch(e){
    console.error('backup err',e);
    toast$('خطأ في النسخ الاحتياطي: '+e.message,'error');
  }
}

function doRestorePrompt(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async evt => {
    const file = evt.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
      try{
        const parsed = JSON.parse(e.target.result);
        // Support both direct data and versioned backup format
        const d = parsed.version ? parsed.data : parsed;
        if(!d.locations || !d.categories){
          return toast$('ملف غير صالح: يجب أن يحتوي على locations و categories','error');
        }
        const empCount = (d.locations||[]).reduce((s,l)=>s+(l.employees||[]).length,0);
        if(!confirm(`هل تريد استعادة النسخة الاحتياطية؟\n\nالمحتوى:\n• ${(d.locations||[]).length} قسم\n• ${empCount} موظف\n• ${(d.categories||[]).length} صنف تقييم\n• ${(d.tasks||[]).length} مهمة\n\n⚠️ سيتم استبدال جميع البيانات الحالية!`)) return;
        toast$('جاري الاستعادة...','info');
        S.data = {
          categories: d.categories||[],
          tasks:      d.tasks||[],
          managers:   d.managers||[],
          leaves:     d.leaves||[],
          locations:  (d.locations||[]).map(l=>({...l, employees:(l.employees||[])}))
        };
        await syncToFirebase();
        toast$('✅ تمت استعادة البيانات بنجاح');
        render();
      }catch(err){
        console.error('restore err',err);
        toast$('خطأ في قراءة الملف: '+err.message,'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

}

function renderAllRatings(){
  const cats=S.data.categories,emps=allEmps();
  const ranked=[...emps].filter(e=>e.ratings.length>0).sort((a,b)=>overallAvg(b.ratings)-overallAvg(a.ratings));
  return`<div class="page">
    <div class="row" style="margin-bottom:20px">
      <button class="back-btn" onclick="S.view='home';render()">←</button>
      <div style="font-weight:800;font-size:20px">🏆 تقييمات الموظفين</div>
    </div>
    <div style="background:var(--dark2);border-radius:16px;padding:14px;border:1px solid #CC000033;margin-bottom:16px">
      <button onclick="S.reportOpen=!S.reportOpen;render()" style="width:100%;background:none;font-family:inherit;display:flex;align-items:center;justify-content:space-between;color:#fff;padding:0">
        <span style="font-weight:700;font-size:14px">📊 تقرير حسب التاريخ</span>
        <span style="font-size:18px;color:#CC0000;transform:${S.reportOpen?'rotate(180deg)':'none'};transition:transform .3s">⌄</span>
      </button>
      ${S.reportOpen?`<div style="margin-top:14px">
        <div style="display:flex;gap:10px;margin-bottom:12px">
          <div style="flex:1"><label style="font-size:11px;color:#888;display:block;margin-bottom:5px">من تاريخ</label><input type="date" value="${S.reportFrom}" oninput="S.reportFrom=this.value;render()" style="width:100%;padding:10px;background:var(--dark3);border:1px solid #444;border-radius:12px;color:#fff;font-size:13px;font-family:inherit;outline:none"/></div>
          <div style="flex:1"><label style="font-size:11px;color:#888;display:block;margin-bottom:5px">إلى تاريخ</label><input type="date" value="${S.reportTo}" oninput="S.reportTo=this.value;render()" style="width:100%;padding:10px;background:var(--dark3);border:1px solid #444;border-radius:12px;color:#fff;font-size:13px;font-family:inherit;outline:none"/></div>
        </div>
        ${(()=>{const from=S.reportFrom||'2000-01-01',to=S.reportTo||TODAY;const reps=emps.map(e=>({...e,fr:e.ratings.filter(r=>r.date>=from&&r.date<=to)})).filter(e=>e.fr.length>0).sort((a,b)=>overallAvg(b.fr)-overallAvg(a.fr));
          return`<div style="background:var(--dark);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;gap:12px"><div style="text-align:center;flex:1"><div style="font-size:18px;font-weight:800;color:#2EC4B6">${reps.length}</div><div style="font-size:10px;color:#888">موظف مقيّم</div></div><div style="text-align:center;flex:1"><div style="font-size:18px;font-weight:800;color:#FF9F1C">${reps.reduce((s,e)=>s+e.fr.length,0)}</div><div style="font-size:10px;color:#888">إجمالي التقييمات</div></div><div style="text-align:center;flex:1"><div style="font-size:18px;font-weight:800;color:#FFD700">${reps.length?(reps.reduce((s,e)=>s+overallAvg(e.fr),0)/reps.length).toFixed(1):'—'}</div><div style="font-size:10px;color:#888">متوسط الكل</div></div></div>${reps.length===0?'<div style="text-align:center;color:#555;padding:16px 0;font-size:13px">لا توجد تقييمات في هذه الفترة</div>':reps.map((e,i)=>`<div class="card row" style="margin-bottom:8px"><div style="font-size:16px;width:28px;text-align:center;flex-shrink:0;font-weight:800;color:#888">${i+1}</div><div style="width:36px;height:36px;border-radius:10px;background:${e.locColor}33;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:${e.locColor};flex-shrink:0">${e.name[0]}</div><div style="flex:1"><div style="font-weight:700;font-size:13px">${e.name}</div><div style="font-size:11px;color:#888">${e.locIcon} ${e.locName}</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:#FFD700">${overallAvg(e.fr).toFixed(1)}</div>${perfLabel(overallAvg(e.fr))}</div></div>`).join('')}`;})()}
      </div>`:''}
    </div>
    <div class="tab-bar">${[['all','📋 كل الموظفين'],['rank','🥇 الترتيب']].map(([k,l])=>`<button class="tab-btn ${S.ratingsTab===k?'active':''}" onclick="S.ratingsTab='${k}';render()">${l}</button>`).join('')}</div>
    ${S.ratingsTab==='all'?`
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${cats.map(c=>badge(`${c.icon} ${c.label}`,c.color)).join('')}</div>
      ${S.data.locations.map(loc=>`<div style="margin-bottom:16px"><div style="font-size:13px;color:${loc.color};font-weight:700;margin-bottom:8px">${loc.icon} ${loc.name}</div>

          <div style="display:flex;align-items:center;gap:12px;${emp.ratings.length?'margin-bottom:10px':''}">
            ${empAvatarH(emp,loc.color,40,12)}
            <div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><div style="font-weight:700;font-size:14px">${emp.name}</div>${isNewEmp(emp)?`<span style="font-size:9px;background:#06D6A0;color:#000;border-radius:5px;padding:2px 6px;font-weight:800">جديد ✨</span>`:''}</div><div style="font-size:11px;color:#888">${emp.role} · ${emp.ratings.length} يوم</div></div>
            <div style="text-align:center">${tr?badge('✅ قُيّم','#06D6A0',10):badge('⏳ لم يُقيّم','#CC0000',10)}${oa>0?`<div style="font-size:13px;color:#FFD700;font-weight:800;margin-top:4px">★${oa.toFixed(1)}</div>`:''}</div>
          </div>
          ${emp.ratings.length>0?`<div style="display:flex;gap:5px">${cats.map(c=>{const ca=catAvg(emp.ratings,c.id);return`<div style="flex:1;background:${c.color}11;border-radius:8px;padding:5px 3px;text-align:center"><div style="font-size:13px">${c.icon}</div><div style="font-size:11px;font-weight:700;color:${c.color}">${ca?ca.toFixed(1):'—'}</div></div>`;}).join('')}</div>`:''}
        </div>`;}).join('')}
      </div>`).join('')}`:`
      <div style="display:flex;flex-direction:column;gap:10px">
        ${ranked.length===0?'<div style="text-align:center;color:#555;padding:40px 0">لا توجد تقييمات بعد</div>':''}
        ${ranked.map((emp,i)=>{const oa=overallAvg(emp.ratings),medals=['🥇','🥈','🥉'],bcs=['#FFD70044','#C0C0C044','#CD7F3244'];return`<div class="card" onclick="S.prevView='allRatings';S.selLocId='${emp.locId}';S.selEmpId='${emp.id}';S.ratingScores={};S.ratingNote='';S.empDetailTab='overview';S.view='employeeDetail';render()" style="cursor:pointer;border:1px solid ${i<3?bcs[i]:'#333'}">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">

            ${empAvatarH(emp,emp.locColor,40,12)}
            <div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><div style="font-weight:700;font-size:14px">${emp.name}</div>${isNewEmp(emp)?`<span style="font-size:9px;background:#06D6A0;color:#000;border-radius:5px;padding:2px 6px;font-weight:800">جديد ✨</span>`:''}</div><div style="font-size:11px;color:#888">${emp.locIcon} ${emp.locName}</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:#FFD700">${oa.toFixed(1)}</div>${perfLabel(oa)}</div>
          </div>
          <div style="display:flex;gap:6px">${cats.map(c=>{const ca=catAvg(emp.ratings,c.id);const col=ca?circleColor(Math.round(ca)):c.color;return`<div style="flex:1"><div style="font-size:11px;color:#888;text-align:center;margin-bottom:3px">${c.icon}</div><div style="height:4px;background:#333;border-radius:4px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,#EF476F,#FFD700,#06D6A0);width:${ca/10*100}%"></div></div><div style="font-size:10px;color:${col};text-align:center;margin-top:2px;font-weight:700">${ca?ca.toFixed(1):'—'}</div></div>`;}).join('')}</div>

function empListH(emps,loc,cats){
  if(!emps||!loc)return'';

    return`<div class="card" onclick="S.prevView='location';S.selLocId='${loc.id}';S.selEmpId='${emp.id}';S.ratingScores={};S.ratingNote='';S.empDetailTab='overview';S.view='employeeDetail';render()" style="margin-bottom:10px;cursor:pointer">

        <div style="width:48px;height:48px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid ${loc.color}44">
          ${emp.photo?`<img src="${emp.photo}" style="width:100%;height:100%;object-fit:cover"/>`:
            `<div style="width:100%;height:100%;background:${loc.color}33;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:${loc.color}">${emp.name[0]}</div>`}

        <div style="flex:1"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><div style="font-weight:700;font-size:15px">${emp.name}</div>${isNewEmp(emp)?`<span style="font-size:9px;background:#06D6A0;color:#000;border-radius:5px;padding:2px 6px;font-weight:800">جديد ✨</span>`:''}</div><div style="font-size:12px;color:#888;margin-top:2px">${emp.role}</div>
          <div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap">
            ${badge(`${emp.shift===12?'🕛':'🕗'} ${emp.shift} ساعة`,SHIFT_COLOR[emp.shift],10)}

            ${oa>0?badge(`★ ${oa.toFixed(1)}`,'#FFD700',10):''}

      </div>
      ${emp.ratings.length>0?`<div style="display:flex;gap:5px">${cats.map(c=>{const ca=catAvg(emp.ratings,c.id);return`<div style="flex:1;background:${c.color}11;border-radius:8px;padding:5px 3px;text-align:center"><div style="font-size:12px">${c.icon}</div><div style="font-size:11px;font-weight:700;color:${c.color}">${ca?ca.toFixed(1):'—'}</div></div>`;}).join('')}</div>`:''}
    </div>`;
  }).join('');
}

  return`<div class="page">
    <div class="row" style="margin-bottom:28px">
      <button class="back-btn" onclick="S.view='home';render()">←</button>
      <div style="font-weight:800;font-size:20px">🏠 إضافة قسم جديد</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:20px">
      <div><label class="lbl">اسم القسم *</label><input class="inp" value="${S.locForm.name}" oninput="S.locForm.name=this.value" placeholder="مثال: المطبخ"/></div>
      <div><label class="lbl">اختر أيقونة</label><div id="loc-icon-p" style="display:flex;gap:8px;flex-wrap:wrap">${locIconsH()}</div></div>
      <div><label class="lbl">اختر لون</label><div id="loc-color-p" style="display:flex;gap:8px;flex-wrap:wrap">${locColorsH()}</div></div>
      <button onclick="doAddLoc()" style="margin-top:8px;padding:16px;background:${S.locForm.color};border-radius:16px;color:#fff;font-size:16px;font-weight:700;font-family:inherit">✅ إضافة القسم</button>
    </div>
  </div>`;
}

// ══════════════════ MAIN RENDER ══════════════════

function mountLeaveCalendar(){
  const el = document.getElementById('leave-cal-mount');
  if(!el) return;
  const emp = curEmp(), loc = curLoc();
  if(!emp || !loc || !S.showLeaveCalendar) { el.innerHTML=''; return; }
  el.innerHTML = renderLeaveCalendar(emp.id, emp.name, loc.name, loc.color);
}

function render(){
  const app=document.getElementById('app'); if(!app)return;
  window.scrollTo(0,0);
  // Will mount leave calendar after render if needed
  requestAnimationFrame(mountLeaveCalendar);
  if(S.authStep==='loading')     {app.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div>`;return;}
  if(!S.authUser||S.authStep==='login'||S.authStep==='forgot'){app.innerHTML=renderLogin();return;}
  if(!S.data)                    {app.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div>`;return;}
  if(S.managerView&&S.isSuperAdmin){app.innerHTML=renderManagers();return;}
  switch(S.view){
    case 'home':             app.innerHTML=renderHome();break;
    case 'manageCategories': app.innerHTML=renderManageCats();break;
    case 'allRatings':       app.innerHTML=renderAllRatings();break;
    case 'location':         app.innerHTML=renderLocation();break;
    case 'employeeDetail':   app.innerHTML=renderEmpDetail();break;
    case 'addEmployee':
    case 'editEmployee':     app.innerHTML=renderEmpForm();break;
    case 'addLocation':      app.innerHTML=renderAddLoc();break;
    default:                 app.innerHTML=renderHome();
  }
}

// ══════════════════ AUTH LISTENER ══════════════════
auth.onAuthStateChanged(async user=>{
  if(user){
    S.authUser=user;
    S.isSuperAdmin=(user.email===SUPER_ADMIN_EMAIL);
    S.authStep='app';
    await loadOrInit();
    // Check salary access
    const mgr=(S.data.managers||[]).find(m=>m.email===user.email);
    S.canSeeSalary=S.isSuperAdmin||(mgr?.salaryAccess===true);
    render();
  } else {
    S.authUser=null; S.isSuperAdmin=false;
    if(S.authStep==='app') S.authStep='login';
    render();
  }
});

render();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
